{% extends "base.html" %}

{% block title %}Edit Profile - AoT{% endblock %}

{% block content %}
<section class="edit-profile-page">
    <div class="form-container">
        <div class="form-header">
            <h1>Edit Profile</h1>
        </div>

        <form method="POST" class="profile-form">
            <div class="form-group">
                <label for="display_name">Display Name</label>
                <input type="text" id="display_name" name="display_name"
                       value="{{ user.display_name or user.username }}"
                       placeholder="Your display name">
            </div>

            <div class="form-group">
                <label for="bio">Bio</label>
                <textarea id="bio" name="bio" rows="3"
                          placeholder="Tell us about yourself">{{ user.bio or '' }}</textarea>
            </div>

            <div class="form-group">
                <label for="theme">Theme</label>
                <select id="theme" name="theme">
                    <option value="dark" {% if user.theme == 'dark' %}selected{% endif %}>Dark</option>
                    <option value="light" {% if user.theme == 'light' %}selected{% endif %}>Light</option>
                </select>
            </div>

            <div class="form-group checkbox-group">
                <label class="checkbox-label">
                    <input type="checkbox" name="is_public" {% if user.is_public %}checked{% endif %}>
                    <span>Make my profile public</span>
                </label>
                <p class="form-help">Public profiles can be viewed by anyone with the link.</p>
            </div>

            <div class="form-actions">
                <a href="{{ url_for('profile') }}" class="btn btn-secondary">Cancel</a>
                <button type="submit" class="btn btn-primary">Save Changes</button>
            </div>
        </form>
    </div>
</section>
{% endblock %}
