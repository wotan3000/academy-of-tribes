{% extends "base.html" %}

{% block title %}Your Results - AoT{% endblock %}

{% block content %}
<section class="results-container" id="results-container">
    <div class="results-loading">
        <div class="spinner"></div>
        <p>Loading your results...</p>
    </div>
</section>

<template id="results-template">
    <div class="results-header">
        <div class="results-badge">Your Personality Type</div>
        <div class="type-display">
            <span class="type-letters" id="type-letters"></span>
        </div>
        <h1 class="type-title" id="type-title"></h1>
        <p class="type-summary" id="type-summary"></p>
    </div>

    <div class="results-breakdown">
        <h2>Your Dimension Scores</h2>
        <div class="dimension-bars">
            <div class="dimension-bar">
                <div class="dimension-labels">
                    <span class="label-left">Extraversion (E)</span>
                    <span class="label-right">Introversion (I)</span>
                </div>
                <div class="bar-container">
                    <div class="bar-fill bar-left" id="bar-e"></div>
                    <div class="bar-center"></div>
                    <div class="bar-fill bar-right" id="bar-i"></div>
                </div>
                <div class="dimension-percentages">
                    <span id="pct-e">50%</span>
                    <span id="pct-i">50%</span>
                </div>
            </div>

            <div class="dimension-bar">
                <div class="dimension-labels">
                    <span class="label-left">Sensing (S)</span>
                    <span class="label-right">Intuition (N)</span>
                </div>
                <div class="bar-container">
                    <div class="bar-fill bar-left" id="bar-s"></div>
                    <div class="bar-center"></div>
                    <div class="bar-fill bar-right" id="bar-n"></div>
                </div>
                <div class="dimension-percentages">
                    <span id="pct-s">50%</span>
                    <span id="pct-n">50%</span>
                </div>
            </div>

            <div class="dimension-bar">
                <div class="dimension-labels">
                    <span class="label-left">Thinking (T)</span>
                    <span class="label-right">Feeling (F)</span>
                </div>
                <div class="bar-container">
                    <div class="bar-fill bar-left" id="bar-t"></div>
                    <div class="bar-center"></div>
                    <div class="bar-fill bar-right" id="bar-f"></div>
                </div>
                <div class="dimension-percentages">
                    <span id="pct-t">50%</span>
                    <span id="pct-f">50%</span>
                </div>
            </div>

            <div class="dimension-bar">
                <div class="dimension-labels">
                    <span class="label-left">Judging (J)</span>
                    <span class="label-right">Perceiving (P)</span>
                </div>
                <div class="bar-container">
                    <div class="bar-fill bar-left" id="bar-j"></div>
                    <div class="bar-center"></div>
                    <div class="bar-fill bar-right" id="bar-p"></div>
                </div>
                <div class="dimension-percentages">
                    <span id="pct-j">50%</span>
                    <span id="pct-p">50%</span>
                </div>
            </div>
        </div>
    </div>

    <div class="results-details">
        <div class="detail-card">
            <h3>
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
                </svg>
                Strengths
            </h3>
            <ul id="strengths-list"></ul>
        </div>

        <div class="detail-card">
            <h3>
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
                </svg>
                Challenges
            </h3>
            <ul id="challenges-list"></ul>
        </div>

        <div class="detail-card">
            <h3>
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="2" y="7" width="20" height="14" rx="2" ry="2"/>
                    <path d="M16 21V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v16"/>
                </svg>
                Career Paths
            </h3>
            <ul id="careers-list"></ul>
        </div>

        <div class="detail-card">
            <h3>
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/>
                    <circle cx="9" cy="7" r="4"/>
                    <path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/>
                </svg>
                Famous People
            </h3>
            <ul id="famous-list"></ul>
        </div>
    </div>

    <div class="results-actions">
        <button class="btn btn-secondary" onclick="shareResults()">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="18" cy="5" r="3"/>
                <circle cx="6" cy="12" r="3"/>
                <circle cx="18" cy="19" r="3"/>
                <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/>
                <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
            </svg>
            Share Results
        </button>
        <a href="{{ url_for('assessments_list') }}" class="btn btn-primary">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="1 4 1 10 7 10"/>
                <path d="M3.51 15a9 9 0 102.13-9.36L1 10"/>
            </svg>
            Retake Quiz
        </a>
        <a href="{{ url_for('all_types') }}" class="btn btn-secondary">
            Explore All Types
        </a>
    </div>
</template>
{% endblock %}

{% block scripts %}
<script>
    const resultId = '{{ result_id }}';
    const container = document.getElementById('results-container');
    const template = document.getElementById('results-template');

    // Try to get cached result first
    let cachedResult = sessionStorage.getItem('mbtiResult');
    if (cachedResult) {
        cachedResult = JSON.parse(cachedResult);
        if (cachedResult.result_id === resultId) {
            displayResults(cachedResult);
        } else {
            fetchResults();
        }
    } else {
        fetchResults();
    }

    async function fetchResults() {
        try {
            const response = await fetch(`/api/results/${resultId}`);
            const data = await response.json();

            if (response.ok) {
                displayResults(data);
            } else {
                container.innerHTML = `
                    <div class="error-message">
                        <h2>Results Not Found</h2>
                        <p>We couldn't find your results. Please try taking the quiz again.</p>
                        <a href="{{ url_for('assessments_list') }}" class="btn btn-primary">Take Quiz</a>
                    </div>
                `;
            }
        } catch (error) {
            console.error('Error:', error);
            container.innerHTML = `
                <div class="error-message">
                    <h2>Error Loading Results</h2>
                    <p>An error occurred while loading your results.</p>
                    <a href="{{ url_for('assessments_list') }}" class="btn btn-primary">Take Quiz Again</a>
                </div>
            `;
        }
    }

    function displayResults(data) {
        container.innerHTML = template.innerHTML;

        const { type, description, percentages } = data;

        // Set type and description
        document.getElementById('type-letters').textContent = type;
        document.getElementById('type-title').textContent = description.title || '';
        document.getElementById('type-summary').textContent = description.summary || '';

        // Set accent color
        if (description.color) {
            document.documentElement.style.setProperty('--result-accent', description.color);
            document.querySelector('.type-letters').style.color = description.color;
        }

        // Set percentages and bars
        setDimensionBar('e', 'i', percentages.E, percentages.I);
        setDimensionBar('s', 'n', percentages.S, percentages.N);
        setDimensionBar('t', 'f', percentages.T, percentages.F);
        setDimensionBar('j', 'p', percentages.J, percentages.P);

        // Set lists
        setList('strengths-list', description.strengths || []);
        setList('challenges-list', description.challenges || []);
        setList('careers-list', description.careers || []);
        setList('famous-list', description.famous || []);

        // Animate bars
        setTimeout(() => {
            document.querySelectorAll('.bar-fill').forEach(bar => {
                bar.style.transition = 'width 0.8s ease-out';
            });
        }, 100);
    }

    function setDimensionBar(left, right, leftPct, rightPct) {
        const leftBar = document.getElementById(`bar-${left}`);
        const rightBar = document.getElementById(`bar-${right}`);

        leftBar.style.width = `${leftPct}%`;
        rightBar.style.width = `${rightPct}%`;

        document.getElementById(`pct-${left}`).textContent = `${leftPct}%`;
        document.getElementById(`pct-${right}`).textContent = `${rightPct}%`;

        // Highlight dominant side
        if (leftPct > rightPct) {
            leftBar.classList.add('dominant');
        } else {
            rightBar.classList.add('dominant');
        }
    }

    function setList(elementId, items) {
        const list = document.getElementById(elementId);
        list.innerHTML = items.map(item => `<li>${item}</li>`).join('');
    }

    function shareResults() {
        const url = window.location.href;
        const type = document.getElementById('type-letters').textContent;
        const title = document.getElementById('type-title').textContent;

        const text = `I just discovered I'm a ${type} (${title}) personality type! Take the MBTI quiz to find out yours:`;

        if (navigator.share) {
            navigator.share({
                title: `My MBTI Type: ${type}`,
                text: text,
                url: url
            }).catch(console.error);
        } else {
            // Fallback: copy to clipboard
            navigator.clipboard.writeText(`${text} ${url}`).then(() => {
                alert('Link copied to clipboard!');
            }).catch(() => {
                prompt('Copy this link to share:', url);
            });
        }
    }
</script>
{% endblock %}
